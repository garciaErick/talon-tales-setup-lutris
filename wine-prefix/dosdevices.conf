# TalonTales Wine Prefix - DosDevices Configuration
# =============================================
# This file documents the drive letter mappings in the Wine prefix.
# These symlinks are created in $WINEPREFIX/dosdevices/
#
# After running setup.sh, verify these exist with: ls -la $WINEPREFIX/dosdevices/

# Standard drives (created by wineboot automatically):
#   c: -> ../drive_c          (Wine virtual C: drive)
#   z: -> /                   (Linux root filesystem)

# Custom drive mapping:
#   e: -> /mnt/holy-grail     (Game's parent mount point)
#
# This mapping is required because the game was originally installed on
# Windows at E:\ok-to-delete\Games\TalonTales. The Wine prefix preserves
# this path mapping so internal game references resolve correctly.
#
# The setup.sh script creates this symlink automatically.

# Block device mappings (created by wineboot, hardware-specific):
#   d: -> /dev/sdb            (whole disk)
#   e: -> /dev/sdb2           (partition - NOTE: also mapped to mount above)
#   f: -> /dev/sdb1           (partition)

# Serial ports (created by wineboot automatically):
#   com1..com32 -> /dev/ttyS0..ttyS31
